<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Dina Turki — Design d'intérieur & Visualisation 3D</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700&family=Playfair+Display:wght@500;600;700&display=swap" rel="stylesheet">

  <style>

    :root {
      --beige: #F6F1EB;
      --black: #111111;
      --terracotta: #B56A4A;
      --navy: #0B1F2A;
      --taupe: #8A7A68;
      --white: #ffffff;
    }

    * {
      box-sizing: border-box;
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      font-family: 'Manrope', sans-serif;
      background: var(--beige);
      color: var(--black);
    }


    h1, h2, h3 {
      font-family: 'Playfair Display', serif;
      font-weight: 600;
    }


    header {
      position: fixed;
      top:0;
      width:100%;
      z-index:1000;
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:25px 60px;
      background:rgba(246,241,235,0.85);
      backdrop-filter:blur(10px);
    }


    .logo {
      font-size:24px;
      letter-spacing:1px;
    }


    nav a {
      margin:0 15px;
      text-decoration:none;
      color:var(--black);
      font-size:15px;
      transition:0.3s;
    }


    nav a:hover {
      color:var(--terracotta);
    }


    .language-switcher {

      border:none;
      background:var(--terracotta);
      color:white;
      padding:8px 16px;
      border-radius:30px;
      cursor:pointer;

    }


    /* HERO */


    #hero {

      height:100vh;
      background:
      linear-gradient(
      rgba(0,0,0,0.45),
      rgba(0,0,0,0.45)
      ),
      url('hero-placeholder.jpg');

      background-size:cover;
      background-position:center;

      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;

      text-align:center;
      color:white;

      padding:20px;

    }


    #hero h1 {

      font-size:70px;
      margin:0;

    }


    #hero p {

      max-width:700px;
      font-size:20px;

    }


    .btn {

      display:inline-block;
      margin-top:30px;
      padding:15px 35px;

      background:var(--terracotta);
      color:white;

      text-decoration:none;
      border-radius:40px;

      transition:0.3s;

    }


    .btn:hover {

      background:var(--navy);

    }


  </style>

</head>


<body>


<header>

<div class="logo">
Dina Turki
</div>


<nav>

<a href="#hero" data-fr="Accueil" data-en="Home">Accueil</a>

<a href="#about" data-fr="À propos" data-en="About">À propos</a>

<a href="#services" data-fr="Services" data-en="Services">Services</a>

<a href="#portfolio" data-fr="Projets" data-en="Projects">Projets</a>

<a href="#contact" data-fr="Contact" data-en="Contact">Contact</a>

</nav>


<button class="language-switcher" onclick="switchLanguage()">
EN
</button>


</header>

Dina Turki
</h1>

data-en="

">
